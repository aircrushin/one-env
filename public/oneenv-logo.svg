<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="oneenvLogoTitle oneenvLogoDesc">
  <title id="oneenvLogoTitle">oneenv futuristic retro logo</title>
  <desc id="oneenvLogoDesc">A synthwave-inspired logo mark with neon gradients, horizon grid, and oneenv wordmark.</desc>
  <defs>
    <linearGradient id="neonStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7a18"/>
      <stop offset="48%" stop-color="#ff2bd1"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>

    <linearGradient id="horizonGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff9f1c" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#ff2bd1" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#17142b" stop-opacity="0.95"/>
    </linearGradient>

    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="55%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <pattern id="retroGrid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M 22 0 L 0 0 0 22" fill="none" stroke="#00e5ff" stroke-opacity="0.25" stroke-width="1"/>
    </pattern>

    <clipPath id="sunClip">
      <circle cx="210" cy="210" r="128"/>
    </clipPath>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(24 24)">
    <rect x="0" y="0" width="372" height="372" rx="36" fill="#090711"/>

    <g clip-path="url(#sunClip)">
      <rect x="82" y="82" width="256" height="256" fill="url(#horizonGlow)"/>
      <rect x="82" y="248" width="256" height="90" fill="#07040f"/>
      <rect x="82" y="248" width="256" height="90" fill="url(#retroGrid)"/>
      <path d="M 82 228 C 128 198 164 212 210 188 C 256 164 292 176 338 150 L 338 260 L 82 260 Z" fill="#100b1f"/>
      <g stroke="#ffd166" stroke-width="5" stroke-linecap="round" stroke-opacity="0.9">
        <line x1="98" y1="108" x2="322" y2="108"/>
        <line x1="90" y1="134" x2="330" y2="134"/>
        <line x1="88" y1="160" x2="332" y2="160"/>
        <line x1="86" y1="186" x2="334" y2="186"/>
      </g>
    </g>

    <circle cx="210" cy="210" r="128" fill="none" stroke="url(#neonStroke)" stroke-width="8" filter="url(#softGlow)"/>
    <circle cx="210" cy="210" r="152" fill="none" stroke="#ff2bd1" stroke-opacity="0.45" stroke-width="2"/>

    <path d="M 156 264 L 168 168 L 210 214 L 252 168 L 264 264" fill="none" stroke="#00e5ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>
    <path d="M 178 204 L 242 204" stroke="#ffd166" stroke-width="6" stroke-linecap="round"/>
  </g>

  <g transform="translate(430 76)">
    <text x="0" y="182" fill="url(#textGradient)" font-size="144" font-weight="700" letter-spacing="7" font-family="Orbitron, 'Exo 2', 'Segoe UI', sans-serif">oneenv</text>
    <rect x="4" y="204" width="716" height="8" rx="4" fill="url(#neonStroke)" opacity="0.85"/>
    <text x="8" y="252" fill="#94a3b8" font-size="28" letter-spacing="6" font-family="'Exo 2', 'Segoe UI', sans-serif">FUTURE RETRO SYSTEM</text>
  </g>
</svg>
